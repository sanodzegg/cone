<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Syne:wght@400..800&display=swap"
    rel="stylesheet">
  <script>
    (function () {
      var theme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.classList.add(theme);
    })();
  </script>
</head>

<body>
  <div id="splash" style="position: fixed; inset: 0; display: none; align-items: center; justify-content: center;">
    <img src="/src/assets/logo.svg" width="80" height="80" alt="Cone logo">
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if (!sessionStorage.getItem("splashed")) {
      sessionStorage.setItem("splashed", true);
      document.getElementById("splash").style.display = 'flex';
    }
  </script>
</body>

</html>
